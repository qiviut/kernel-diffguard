name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install package with development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q
      - name: Run golden analysis regression cases
        run: scripts/run-golden-analysis.sh
      - name: Run lint
        run: ruff check .
      - name: Run type checks
        run: mypy src
