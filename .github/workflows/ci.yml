name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # Upstream action: actions/checkout, upstream tag intent: v6.
        # Refresh intentionally with the procedure in docs/testing-strategy.md.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python
        # Upstream action: actions/setup-python, upstream tag intent: v6.
        # Refresh intentionally with the procedure in docs/testing-strategy.md.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      - name: Install package with development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run verification suite
        run: scripts/check.sh
