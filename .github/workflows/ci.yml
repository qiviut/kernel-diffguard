name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install package with development dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q
      - name: Run golden analysis regression cases
        run: scripts/run-golden-analysis.sh
      - name: Run review-signal scorecard
        run: scripts/run-scorecard.sh
      - name: Run lint
        run: ruff check .
      - name: Run type checks
        run: mypy src
